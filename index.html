<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>과일 짝맞추기 게임</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="app">
    <section class="game-panel">
      <p class="eyebrow">Memory Game</p>
      <h1>과일 짝맞추기</h1>
      <p class="description">
        카드를 두 장씩 뒤집어서 같은 과일을 찾는 4x4 기억력 게임입니다.
      </p>

      <div class="status-row">
        <div class="status-box">
          <span class="status-label">현재 상태</span>
          <strong id="status">카드를 두 장 뒤집어보세요.</strong>
        </div>
        <div class="status-box">
          <span class="status-label">시도 횟수</span>
          <strong id="attempt-count">0</strong>
        </div>
        <div class="status-box">
          <span class="status-label">맞춘 카드 쌍</span>
          <strong id="matched-count">0 / 8</strong>
        </div>
      </div>

      <div class="board" id="board" aria-label="과일 짝맞추기 보드"></div>

      <button class="reset-button" id="reset-button">다시 시작</button>
    </section>
  </main>

  <script src="js/utils.js"></script>
  <script src="js/board.js"></script>
  <script src="js/game.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
